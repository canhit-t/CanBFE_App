# Phase 3 — Model training and ablations
# ----------------------------------------
# Run:
#   python -m src.training.train --config configs/phase3.yaml --model sequence_only
#   python -m src.training.train --config configs/phase3.yaml --model graph_only
#   python -m src.training.train --config configs/phase3.yaml --model concat_fusion
#   python -m src.training.train --config configs/phase3.yaml --model cross_attention_fusion
#   python -m src.training.train --config configs/phase3.yaml --model pocket_sequence_only
#   python -m src.training.train --config configs/phase3.yaml --model pocket_esm2_graph_fusion

output_dir: outputs/phase3_v2/

data:
  # ── Feature files (produced by Phase 2A / 2B pipelines) ──
  metadata_path:       data/processed/all_metadata.parquet
  feature_index_path:  data/features/feature_index.parquet
  graph_index_path:    data/features/graphs/graph_index.parquet    # set to null to skip graph filter
  prot_emb_path:       data/features/protein_global_embeddings.pt
  lig_emb_path:        data/features/ligand_smiles_embeddings.pt
  graph_dir:           data/features/graphs
  # Pocket-contextual ESM2 embeddings (generated by build_pocket_esm2_features.py)
  pocket_esm2_path:    data/features/pocket_esm2_embeddings.pt

  # ── Split file (auto-generated if missing) ──
  split_file:          data/splits/train_val_external.parquet

training:
  seed:         42
  val_frac:     0.10          # fraction of PDBBind rows held out for val
  batch_size:   64
  num_workers:  0             # 0 = load in main process (safe on Windows)
  max_epochs:   100
  lr:           1.0e-3
  weight_decay: 1.0e-4
  patience:     20            # early-stopping epochs without val RMSE improvement
  lr_factor:    0.5           # ReduceLROnPlateau factor
  lr_patience:  5             # ReduceLROnPlateau patience
  device:       cuda          # set to "cpu" if no compatible GPU

# ── Per-model architecture hyper-parameters ──
# Keys must match __init__ signatures in src/models/fusion.py
models:

  sequence_only:
    prot_dim:    480
    lig_dim:     384
    hidden_dims: [512, 256]
    dropout:     0.2

  graph_only:
    node_dim:    10
    gnn_hidden:  128
    gnn_out:     128
    n_layers:    2
    hidden_dims: [256, 128]
    dropout:     0.2
    rbf_dim:     16   # RBF distance encoding; set to 0 for topology-only (no distances)

  concat_fusion:
    prot_dim:    480
    lig_dim:     384
    node_dim:    10
    gnn_hidden:  128
    gnn_out:     128
    n_layers:    2
    hidden_dims: [512, 256]
    dropout:     0.2
    rbf_dim:     16   # RBF distance encoding; set to 0 for topology-only (no distances)

  cross_attention_fusion:
    prot_dim:    480
    lig_dim:     384
    node_dim:    10
    hidden_dim:  128
    n_layers:    2
    n_heads:     4
    hidden_dims: [256, 128]
    dropout:     0.2
    rbf_dim:     16   # RBF distance encoding; set to 0 for topology-only (no distances)
    # A1: residual + LayerNorm around cross-attention outputs (set false to ablate)
    use_attention_residuals: true
    # A2: learned softmax pooling over local node embeddings (set false → mean pool)
    use_attention_pooling: true
    # A3: learned softmax pooling over global sequence tokens (set false → mean pool)
    use_global_attention_pooling: true
